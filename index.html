<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meucorte</title>
<link rel="icon" type="image/png" href="favicon-meucorte.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #171310;
    --panel: #241D17;
    --panel-2: #2E251D;
    --line: #3a2f24;
    --text: #EFE6D8;
    --text-dim: #ab9f8e;
    --brass: #B08A4A;
    --brass-dim: #8a6c39;
    --open: #6B8F71;
    --blocked: #8C3F2E;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: radial-gradient(1200px 600px at 50% -10%, #241d16 0%, var(--bg) 55%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  header{
    padding: 32px 20px 24px;
    text-align:center;
    border-bottom: 1px solid var(--line);
  }
  header img.logo{
    width: 108px;
    height: 108px;
    display:block;
    margin: 0 auto 6px;
  }
  header h1{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 42px;
    margin:0;
    color: var(--text);
  }
  header .rule{
    width:60px; height:2px; background:var(--brass); margin: 10px auto 12px;
  }
  header p{
    margin:0; color: var(--text-dim); font-size:14px;
  }
  main{
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .step{
    background: var(--panel);
    border:1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }
  .step h2{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    letter-spacing:1px;
    font-size:20px;
    margin:0 0 12px;
    color: var(--brass);
  }
  .step h2 .n{
    display:inline-block;
    width:22px;height:22px;
    border:1px solid var(--brass-dim);
    border-radius:50%;
    font-family:'Inter';
    font-size:12px;
    text-align:center;
    line-height:20px;
    margin-right:8px;
    color: var(--brass);
  }
  .servicos{ display:flex; flex-direction:column; gap:8px; }
  .servico-item{
    display:flex; justify-content:space-between; align-items:center;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius:8px;
    padding: 12px 14px;
    cursor:pointer;
    transition: border-color .15s;
  }
  .servico-item.sel{ border-color: var(--brass); }
  .servico-item .info b{ display:block; font-size:15px; }
  .servico-item .info span{ font-size:12px; color:var(--text-dim); }
  .servico-item .valor{ font-weight:700; color:var(--brass); }

  input[type=date]{
    width:100%;
    background: var(--panel-2);
    border:1px solid var(--line);
    color: var(--text);
    padding:12px;
    border-radius:8px;
    font-family:'Inter';
    font-size:15px;
  }
  .slots{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:8px;
    margin-top:14px;
  }
  .slot{
    text-align:center;
    padding:10px 4px;
    border-radius:8px;
    border:1px solid var(--line);
    background: var(--panel-2);
    font-size:13px;
    cursor:pointer;
  }
  .slot.sel{ background: var(--open); border-color:var(--open); color:#0d1a0f; font-weight:700; }
  .slot.indisponivel{ opacity:.3; cursor:not-allowed; text-decoration: line-through; }
  .legenda{ display:flex; gap:14px; margin-top:10px; font-size:11px; color:var(--text-dim); }
  .legenda span{ display:inline-flex; align-items:center; gap:5px; }
  .dot{ width:8px;height:8px;border-radius:50%; display:inline-block; }

  label{ display:block; font-size:12px; color:var(--text-dim); margin: 10px 0 5px; }
  input[type=text], input[type=tel], textarea{
    width:100%;
    background: var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:11px;
    border-radius:8px;
    font-family:'Inter';
    font-size:14px;
  }
  textarea{ resize:vertical; min-height:60px; }

  .resumo{
    background: var(--panel-2);
    border:1px solid var(--brass-dim);
    border-radius:8px;
    padding:14px;
    margin: 14px 0;
    font-size:14px;
  }
  .resumo div{ display:flex; justify-content:space-between; padding:3px 0; }
  .resumo .total{ color:var(--brass); font-weight:700; border-top:1px solid var(--line); margin-top:6px; padding-top:8px; }

  button.confirmar{
    width:100%;
    background: var(--brass);
    color: #1b1510;
    border:none;
    padding:14px;
    border-radius:8px;
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:1.5px;
    font-size:18px;
    cursor:pointer;
  }
  button.confirmar:disabled{ opacity:.4; cursor:not-allowed; }

  .msg{ text-align:center; padding: 40px 20px; }
  .msg h2{ font-family:'Bebas Neue'; font-size:28px; color: var(--open); letter-spacing:1px; }
  .oculto{ display:none !important; }
</style>
</head>
<body>

<header>
  <img src="logo-meucorte.png" alt="meucorte" class="logo">
  <h1>meucorte</h1>
  <div class="rule"></div>
  <p>Escolha o serviço, o dia e o horário</p>
</header>

<main>

  <div id="areaAgendamento">

    <div class="step">
      <h2><span class="n">1</span>Serviço</h2>
      <div class="servicos" id="listaServicos">
        <p style="color:var(--text-dim); font-size:13px;">Carregando serviços...</p>
      </div>
    </div>

    <div class="step">
      <h2><span class="n">2</span>Data</h2>
      <input type="date" id="inputData">
    </div>

    <div class="step">
      <h2><span class="n">3</span>Horário</h2>
      <div class="slots" id="listaSlots"></div>
      <div class="legenda">
        <span><span class="dot" style="background:var(--open)"></span>Selecionado</span>
        <span><span class="dot" style="background:var(--panel-2); border:1px solid var(--line)"></span>Livre</span>
        <span><span class="dot" style="background:var(--blocked)"></span>Indisponível</span>
      </div>
    </div>

    <div class="step">
      <h2><span class="n">4</span>Seus dados</h2>
      <label>Nome</label>
      <input type="text" id="inputNome" placeholder="Seu nome">
      <label>Telefone / WhatsApp</label>
      <input type="tel" id="inputTelefone" placeholder="(00) 00000-0000">
      <label>Endereço completo (atendimento a domicílio)</label>
      <input type="text" id="inputEndereco" placeholder="Rua, número, bairro, complemento">
      <label>Comentário (opcional)</label>
      <textarea id="inputComentario" placeholder="Alguma observação para o barbeiro?"></textarea>
      <label style="display:flex; align-items:center; gap:8px; margin-top:12px; cursor:pointer;">
        <input type="checkbox" id="inputLembrar" style="width:auto;">
        <span style="color:var(--text-dim); font-size:12px;">Lembrar meus dados neste aparelho</span>
      </label>
    </div>

    <div class="resumo" id="resumo" style="display:none;">
      <div><span>Serviço</span><span id="resumoServico">-</span></div>
      <div><span>Data</span><span id="resumoData">-</span></div>
      <div><span>Horário</span><span id="resumoHorario">-</span></div>
      <div class="total"><span>Valor</span><span id="resumoValor">-</span></div>
    </div>

    <button class="confirmar" id="btnConfirmar" disabled>Confirmar agendamento</button>
  </div>

  <div class="msg oculto" id="msgSucesso">
    <h2>Agendamento confirmado!</h2>
    <p style="color:var(--text-dim)">O barbeiro foi avisado. Você receberá a confirmação em breve.</p>
  </div>

</main>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, getDoc, setDoc, query, where, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const DIAS_SEMANA_CHAVES = ["dom","seg","ter","qua","qui","sex","sab"];

// ====== CONFIGURAÇÃO FIREBASE — troque pelos dados do seu projeto ======
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"
};
// =========================================================================

// ====== CONFIGURAÇÃO EMAILJS — troque pelos dados da sua conta ======
const EMAILJS_PUBLIC_KEY = "SUA_PUBLIC_KEY";
const EMAILJS_SERVICE_ID = "SEU_SERVICE_ID";
const EMAILJS_TEMPLATE_ID = "SEU_TEMPLATE_ID";
const EMAIL_BARBEIRO = "email-do-barbeiro@exemplo.com";
// =========================================================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const HORA_ABERTURA = 8 * 60;   // 08:00 em minutos
const HORA_FECHAMENTO = 20 * 60; // 20:00 em minutos
const INTERVALO_SLOT = 15; // granularidade dos horários exibidos, em minutos
const MARGEM_POS_ESCALA = 90; // 1h30 de bloqueio após a escala

let servicos = [];
let servicoSelecionado = null;
let slotSelecionado = null;
let dataSelecionada = null;

function toMinutos(hhmm){
  const [h,m] = hhmm.split(":").map(Number);
  return h*60+m;
}
function toHHMM(min){
  const h = Math.floor(min/60).toString().padStart(2,"0");
  const m = (min%60).toString().padStart(2,"0");
  return `${h}:${m}`;
}
function formatarMoeda(v){
  return v.toLocaleString("pt-BR", {style:"currency", currency:"BRL"});
}

// ---------- Carregar serviços ----------
async function carregarServicos(){
  const snap = await getDocs(collection(db, "servicos"));
  servicos = [];
  snap.forEach(d => servicos.push({id:d.id, ...d.data()}));
  const el = document.getElementById("listaServicos");
  if(servicos.length === 0){
    el.innerHTML = `<p style="color:var(--text-dim); font-size:13px;">Nenhum serviço cadastrado ainda.</p>`;
    return;
  }
  el.innerHTML = "";
  servicos.forEach(s => {
    const div = document.createElement("div");
    div.className = "servico-item";
    div.dataset.id = s.id;
    div.innerHTML = `
      <div class="info">
        <b>${s.nome}</b>
        <span>${s.duracaoMin} min</span>
      </div>
      <div class="valor">${formatarMoeda(s.valor)}</div>
    `;
    div.addEventListener("click", () => {
      document.querySelectorAll(".servico-item").forEach(x=>x.classList.remove("sel"));
      div.classList.add("sel");
      servicoSelecionado = s;
      slotSelecionado = null;
      atualizarSlotsSeProntos();
      atualizarResumo();
    });
    el.appendChild(div);
  });
}

// ---------- Buscar bloqueios do dia (escala + manual + agendamentos) ----------
async function buscarBloqueios(dataStr){
  const bloqueios = [];

  // 1) Escala do dia: escalaCalendario/{data} -> {trabalha:true, horaInicio, horaFim} ou {trabalha:false}
  const escalaDoc = await getDoc(doc(db, "escalaCalendario", dataStr));
  if(escalaDoc.exists()){
    const dia = escalaDoc.data();
    if(dia.trabalha){
      const inicio = toMinutos(dia.horaInicio);
      const fim = toMinutos(dia.horaFim) + MARGEM_POS_ESCALA;
      bloqueios.push({inicio, fim, tipo:"escala"});
    }
  }

  // 2) Bloqueios manuais do dia
  const manuaisSnap = await getDocs(query(collection(db, "bloqueiosManuais"), where("data","==",dataStr)));
  manuaisSnap.forEach(d => {
    const b = d.data();
    bloqueios.push({inicio: toMinutos(b.horaInicio), fim: toMinutos(b.horaFim), tipo:"manual"});
  });

  // 3) Horários já ocupados no dia — coleção pública SEM dados do cliente (nome/telefone/endereço ficam só em "agendamentos", que exige login)
  const ocupadosSnap = await getDocs(query(collection(db, "horariosOcupados"), where("data","==",dataStr)));
  ocupadosSnap.forEach(d => {
    const o = d.data();
    bloqueios.push({inicio: toMinutos(o.horaInicio), fim: toMinutos(o.horaFim), tipo:"agendado"});
  });

  return bloqueios;
}

function sobrepoe(aInicio, aFim, bInicio, bFim){
  return aInicio < bFim && bInicio < aFim;
}

let diasSemanaAbertos = null; // cache

async function carregarDiasSemanaAbertos(){
  if(diasSemanaAbertos) return diasSemanaAbertos;
  const snap = await getDoc(doc(db,"config","diasSemana"));
  const dados = snap.exists() ? snap.data() : {};
  diasSemanaAbertos = {};
  DIAS_SEMANA_CHAVES.forEach(chave => {
    diasSemanaAbertos[chave] = dados[chave] !== false; // padrão: aberto
  });
  return diasSemanaAbertos;
}

async function atualizarSlotsSeProntos(){
  if(!servicoSelecionado || !dataSelecionada) return;
  const el = document.getElementById("listaSlots");
  el.innerHTML = `<p style="color:var(--text-dim); font-size:13px;">Carregando horários...</p>`;

  const abertos = await carregarDiasSemanaAbertos();
  const diaSemana = new Date(dataSelecionada+"T00:00:00").getDay(); // 0=dom ... 6=sáb
  const chaveDia = DIAS_SEMANA_CHAVES[diaSemana];
  if(!abertos[chaveDia]){
    el.innerHTML = `<p style="color:var(--text-dim); font-size:13px;">Não atendemos nesse dia da semana. Escolha outra data.</p>`;
    return;
  }

  const bloqueios = await buscarBloqueios(dataSelecionada);
  const duracao = servicoSelecionado.duracaoMin;

  el.innerHTML = "";
  let algumLivre = false;

  for(let t = HORA_ABERTURA; t + duracao <= HORA_FECHAMENTO; t += INTERVALO_SLOT){
    const fimSlot = t + duracao;
    const conflita = bloqueios.some(b => sobrepoe(t, fimSlot, b.inicio, b.fim));

    const div = document.createElement("div");
    div.className = "slot" + (conflita ? " indisponivel" : "");
    div.textContent = toHHMM(t);

    if(!conflita){
      algumLivre = true;
      div.addEventListener("click", () => {
        document.querySelectorAll(".slot").forEach(x=>x.classList.remove("sel"));
        div.classList.add("sel");
        slotSelecionado = {inicio:t, fim:fimSlot};
        atualizarResumo();
      });
    }
    el.appendChild(div);
  }

  if(!algumLivre){
    el.innerHTML = `<p style="color:var(--text-dim); font-size:13px;">Sem horários livres nesse dia para esse serviço.</p>`;
  }
}

function atualizarResumo(){
  const resumo = document.getElementById("resumo");
  const btn = document.getElementById("btnConfirmar");
  if(servicoSelecionado && dataSelecionada && slotSelecionado){
    resumo.style.display = "block";
    document.getElementById("resumoServico").textContent = servicoSelecionado.nome;
    document.getElementById("resumoData").textContent = new Date(dataSelecionada+"T00:00:00").toLocaleDateString("pt-BR");
    document.getElementById("resumoHorario").textContent = `${toHHMM(slotSelecionado.inicio)} - ${toHHMM(slotSelecionado.fim)}`;
    document.getElementById("resumoValor").textContent = formatarMoeda(servicoSelecionado.valor);
    btn.disabled = false;
  } else {
    resumo.style.display = "none";
    btn.disabled = true;
  }
}

document.getElementById("inputData").addEventListener("change", (e) => {
  dataSelecionada = e.target.value;
  slotSelecionado = null;
  atualizarSlotsSeProntos();
  atualizarResumo();
});

// ---------- Lembrar dados neste aparelho (sem conta/login) ----------
const CHAVE_LOCAL = "barbearia_dados_cliente";
(function preencherDadosSalvos(){
  try{
    const salvo = JSON.parse(localStorage.getItem(CHAVE_LOCAL) || "null");
    if(salvo){
      document.getElementById("inputNome").value = salvo.nome || "";
      document.getElementById("inputTelefone").value = salvo.telefone || "";
      document.getElementById("inputEndereco").value = salvo.endereco || "";
      document.getElementById("inputLembrar").checked = true;
    }
  }catch(e){ /* localStorage indisponível: segue sem preencher */ }
})();

document.getElementById("btnConfirmar").addEventListener("click", async () => {
  const nome = document.getElementById("inputNome").value.trim();
  const telefone = document.getElementById("inputTelefone").value.trim();
  const endereco = document.getElementById("inputEndereco").value.trim();
  const comentario = document.getElementById("inputComentario").value.trim();

  if(!nome || !telefone || !endereco){
    alert("Nome, telefone e endereço são obrigatórios para confirmar o agendamento.");
    return;
  }

  try{
    if(document.getElementById("inputLembrar").checked){
      localStorage.setItem(CHAVE_LOCAL, JSON.stringify({nome, telefone, endereco}));
    } else {
      localStorage.removeItem(CHAVE_LOCAL);
    }
  }catch(e){ /* localStorage indisponível: segue normalmente sem salvar */ }

  const btn = document.getElementById("btnConfirmar");
  btn.disabled = true;
  btn.textContent = "Confirmando...";

  try{
    const refAgendamento = doc(collection(db, "agendamentos"));
    const dadosAgendamento = {
      data: dataSelecionada,
      horaInicio: toHHMM(slotSelecionado.inicio),
      horaFim: toHHMM(slotSelecionado.fim),
      servicoId: servicoSelecionado.id,
      servicoNome: servicoSelecionado.nome,
      valor: servicoSelecionado.valor,
      duracaoMin: servicoSelecionado.duracaoMin,
      clienteNome: nome,
      clienteTelefone: telefone,
      clienteEndereco: endereco,
      comentario: comentario || null,
      origem: "particular",
      status: "agendado",
      servicosRealizados: [],
      valorFinal: null,
      criadoEm: Timestamp.now()
    };
    await setDoc(refAgendamento, dadosAgendamento);

    // Registro público, sem dados do cliente — usado só para calcular horários livres/ocupados
    await setDoc(doc(db, "horariosOcupados", refAgendamento.id), {
      data: dataSelecionada,
      horaInicio: dadosAgendamento.horaInicio,
      horaFim: dadosAgendamento.horaFim
    });

    // Dispara e-mail de alerta pro barbeiro (via EmailJS)
    await enviarAlertaEmail(nome, telefone, endereco, comentario);

    document.getElementById("areaAgendamento").classList.add("oculto");
    document.getElementById("msgSucesso").classList.remove("oculto");
  }catch(err){
    console.error(err);
    alert("Não foi possível confirmar o agendamento. Tente novamente.");
    btn.disabled = false;
    btn.textContent = "Confirmar agendamento";
  }
});

async function enviarAlertaEmail(nome, telefone, endereco, comentario){
  try{
    await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        service_id: EMAILJS_SERVICE_ID,
        template_id: EMAILJS_TEMPLATE_ID,
        user_id: EMAILJS_PUBLIC_KEY,
        template_params: {
          to_email: EMAIL_BARBEIRO,
          cliente_nome: nome,
          cliente_telefone: telefone,
          cliente_endereco: endereco,
          servico: servicoSelecionado.nome,
          data: new Date(dataSelecionada+"T00:00:00").toLocaleDateString("pt-BR"),
          horario: `${toHHMM(slotSelecionado.inicio)} - ${toHHMM(slotSelecionado.fim)}`,
          comentario: comentario || "-"
        }
      })
    });
  }catch(e){
    console.warn("Falha ao enviar e-mail de alerta:", e);
  }
}

carregarServicos();
</script>
</body>
</html>
